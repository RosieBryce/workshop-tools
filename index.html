<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      color: #f0e6d3;
      padding: 24px;
    }

    #byline {
      position: fixed;
      top: 16px;
      right: 20px;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      color: #c9a96e;
      letter-spacing: 0.08em;
      opacity: 0.75;
    }

    h1 {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      letter-spacing: 0.08em;
      color: #c9a96e;
      text-align: center;
      margin-bottom: 48px;
    }

    .tools {
      display: flex;
      gap: clamp(16px, 4vw, 40px);
      flex-wrap: wrap;
      justify-content: center;
    }

    .tool-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      padding: 32px 28px;
      border: 2px solid #c9a96e;
      border-radius: 12px;
      width: clamp(200px, 30vw, 280px);
      transition: background 0.2s, color 0.2s;
      color: #f0e6d3;
    }

    .tool-card:hover {
      background: rgba(201, 169, 110, 0.1);
    }

    .tool-card .icon {
      font-size: 2.5rem;
    }

    .tool-card .name {
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      color: #c9a96e;
      text-align: center;
    }

    .tool-card .desc {
      font-size: 0.8rem;
      color: #a09080;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div id="byline">Rosie Bryce</div>

  <h1>Workshop Tools</h1>

  <div class="tools">
    <a class="tool-card" href="image-deck.html">
      <div class="icon">🃏</div>
      <div class="name">Strategic Thinking Cards</div>
      <div class="desc">Draw and reveal cards from a shuffled deck</div>
    </a>
    <a class="tool-card" href="totally-accurate-compliments.html">
      <div class="icon">✨</div>
      <div class="name">Totally Accurate Compliments™</div>
      <div class="desc">100% scientifically verified compliments</div>
    </a>
  </div>

</body>
</html>
