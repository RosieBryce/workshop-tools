<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's the Picture? — Workshop Game</title>
<style>
  :root {
    --bg: #14110f;
    --gold: #d4a843;
    --gold-dim: #8a7335;
    --text: #f3ead8;
    --muted: #9a8f7c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    min-height: 100vh;
  }
  h1 {
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--gold);
    margin: 0 0 4px;
  }
  .sub {
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0 0 22px;
    max-width: 520px;
  }
  #piece {
    width: min(70vw, 70vh, 460px);
    aspect-ratio: 1 / 1;
    background-repeat: no-repeat;
    border: 3px solid var(--gold-dim);
    border-radius: 10px;
    box-shadow: 0 0 0 1px #000, 0 18px 50px rgba(0,0,0,0.55);
    background-color: #000;
  }
  #pieceLabel {
    margin-top: 16px;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .controls {
    margin-top: 26px;
  }
  button {
    background: transparent;
    color: var(--gold);
    border: 1.5px solid var(--gold-dim);
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  button:hover { background: var(--gold); color: var(--bg); border-color: var(--gold); }
  #copyBtn.copied { background: var(--gold); color: var(--bg); border-color: var(--gold); }
</style>
</head>
<body>

  <h1>What's the picture?</h1>
  <p class="sub">You've been handed one piece of a bigger image. Describe your piece in the chat — work together to figure out what the whole picture is.</p>

  <div id="piece"></div>
  <div id="pieceLabel">loading…</div>

  <div class="controls">
    <button id="copyBtn" onclick="copyImage()">Copy image</button>
  </div>

<script>
  const IMAGES = [
    { name: "Eiffel Tower",       url: "https://upload.wikimedia.org/wikipedia/commons/a/a8/Tour_Eiffel_Wikimedia_Commons.jpg" },
    { name: "Van Gogh self-portrait", url: "https://upload.wikimedia.org/wikipedia/commons/4/4c/Vincent_van_Gogh_-_Self-Portrait_-_Google_Art_Project_%28454045%29.jpg" },
    { name: "Big Ben",            url: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Big_Ben_%28Queen_Elizabeth_Tower%29_13.jpg/960px-Big_Ben_%28Queen_Elizabeth_Tower%29_13.jpg" },
    { name: "Sydney Opera House", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Sydney_opera_house_side_view.jpg/960px-Sydney_opera_house_side_view.jpg" },
    { name: "Mona Lisa",          url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg/960px-Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg" },
    { name: "The Louvre",         url: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Louvre_Museum_Wikimedia_Commons.jpg/1280px-Louvre_Museum_Wikimedia_Commons.jpg" },
  ];

  let TARGET_PIECES = 50;

  const params = new URLSearchParams(location.search);
  let imgIndex = parseInt(params.get("img"));
  if (isNaN(imgIndex) || imgIndex < 0 || imgIndex >= IMAGES.length) imgIndex = 2; // default: Big Ben
  if (params.get("n")) TARGET_PIECES = Math.max(4, parseInt(params.get("n")) || 50);

  const pieceEl = document.getElementById("piece");
  const labelEl = document.getElementById("pieceLabel");
  const copyBtn = document.getElementById("copyBtn");

  let cols = 7, rows = 7;
  let currentCol = 0, currentRow = 0;
  let loadedImg = null;

  function loadImage(index) {
    imgIndex = index;
    const src = IMAGES[index].url;
    labelEl.textContent = "loading…";
    pieceEl.style.backgroundImage = "none";
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      loadedImg = img;
      const aspect = img.naturalWidth / img.naturalHeight;
      cols = Math.max(1, Math.round(Math.sqrt(TARGET_PIECES * aspect)));
      rows = Math.max(1, Math.round(TARGET_PIECES / cols));
      const tileAspect = (img.naturalWidth / cols) / (img.naturalHeight / rows);
      pieceEl.style.aspectRatio = tileAspect + " / 1";
      pieceEl.style.backgroundImage = `url("${src}")`;
      pieceEl.style.backgroundSize = `${cols * 100}% ${rows * 100}%`;
      newPiece();
    };
    img.onerror = () => {
      labelEl.textContent = "couldn't load image — URL may be broken";
    };
    img.src = src;
  }

  function newPiece() {
    currentCol = Math.floor(Math.random() * cols);
    currentRow = Math.floor(Math.random() * rows);
    const posX = cols === 1 ? 0 : (currentCol * 100) / (cols - 1);
    const posY = rows === 1 ? 0 : (currentRow * 100) / (rows - 1);
    pieceEl.style.backgroundPosition = `${posX}% ${posY}%`;
    const num = currentRow * cols + currentCol + 1;
    labelEl.textContent = `piece ${num} of ${cols * rows}`;
  }

  function copyImage() {
    if (!loadedImg) return;
    const tileW = Math.floor(loadedImg.naturalWidth / cols);
    const tileH = Math.floor(loadedImg.naturalHeight / rows);
    const canvas = document.createElement("canvas");
    canvas.width = tileW;
    canvas.height = tileH;
    canvas.getContext("2d").drawImage(loadedImg, currentCol * tileW, currentRow * tileH, tileW, tileH, 0, 0, tileW, tileH);
    canvas.toBlob(async (blob) => {
      try {
        await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
        copyBtn.textContent = "Copied!";
        copyBtn.classList.add("copied");
        setTimeout(() => { copyBtn.textContent = "Copy image"; copyBtn.classList.remove("copied"); }, 2000);
      } catch {
        copyBtn.textContent = "Copy failed — try Chrome";
        setTimeout(() => { copyBtn.textContent = "Copy image"; copyBtn.classList.remove("copied"); }, 3000);
      }
    }, "image/png");
  }

  loadImage(imgIndex);
</script>
</body>
</html>
